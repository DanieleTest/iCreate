name: Build, Test & Deploy to Sandbox

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  # ── Gate: proceed only if the review is an approval ───────────────────
  gate:
    name: Check PR Approved
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'
    outputs:
      pr_number: ${{ github.event.pull_request.number }}
      issue_number: ${{ steps.issue.outputs.number }}
    steps:
      - name: Extract linked issue number
        id: issue
        run: |
          # Look for "Issue #NNN" or "#NNN" in PR body
          BODY=$(cat <<'BODY_END'
          ${{ github.event.pull_request.body }}
          BODY_END
          )
          ISSUE=$(echo "$BODY" | grep -oP '#\K[0-9]+' | head -1 || echo "")
          echo "number=$ISSUE" >> "$GITHUB_OUTPUT"
          echo "Linked issue: #$ISSUE"

  # ── Build the AL app ─────────────────────────────────────────────────
  build:
    name: Build AL App
    needs: gate
    runs-on: windows-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        shell: pwsh
        run: |
          $appJson = Get-Content "app.json" | ConvertFrom-Json
          $artifactName = "$($appJson.publisher)_$($appJson.name)_$($appJson.version).app"
          echo "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          echo "App: $artifactName"

      - name: Setup BcContainerHelper
        shell: pwsh
        run: |
          Install-Module BcContainerHelper -Force -AllowClobber
          Import-Module BcContainerHelper

      - name: Create BC container
        id: container
        shell: pwsh
        env:
          BC_LICENSE: ${{ secrets.BC_LICENSE }}
        run: |
          $appJson = Get-Content "app.json" | ConvertFrom-Json
          $containerName = "build"
          $credential = [PSCredential]::new("admin", (ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force))
          $params = @{
            containerName  = $containerName
            accept_eula    = $true
            credential     = $credential
            auth           = "UserPassword"
            artifactUrl    = Get-BcArtifactUrl `
              -type Sandbox `
              -country it `
              -select Latest
            updateHosts    = $true
            memoryLimit    = "8G"
          }
          New-BcContainer @params
          echo "container_name=$containerName" >> $env:GITHUB_OUTPUT

      - name: Compile AL app
        id: compile
        shell: pwsh
        run: |
          $containerName = "${{ steps.container.outputs.container_name }}"
          $credential = [PSCredential]::new("admin", (ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force))
          $appFile = Compile-AppInBcContainer `
            -containerName $containerName `
            -credential $credential `
            -appProjectFolder $env:GITHUB_WORKSPACE `
            -appOutputFolder "$env:GITHUB_WORKSPACE/output"
          echo "app_file=$appFile" >> $env:GITHUB_OUTPUT
          echo "Compiled: $appFile"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: al-app
          path: output/*.app
          retention-days: 30

      - name: Cleanup container
        if: always()
        shell: pwsh
        run: |
          Remove-BcContainer -containerName "${{ steps.container.outputs.container_name }}" -ErrorAction SilentlyContinue

  # ── Run automated tests ──────────────────────────────────────────────
  test:
    name: Run AL Tests
    needs: [gate, build]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .app artifact
        uses: actions/download-artifact@v4
        with:
          name: al-app
          path: output

      - name: Setup BcContainerHelper
        shell: pwsh
        run: |
          Install-Module BcContainerHelper -Force -AllowClobber
          Import-Module BcContainerHelper

      - name: Create BC container for tests
        id: container
        shell: pwsh
        run: |
          $containerName = "test"
          $credential = [PSCredential]::new("admin", (ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force))
          $params = @{
            containerName  = $containerName
            accept_eula    = $true
            credential     = $credential
            auth           = "UserPassword"
            artifactUrl    = Get-BcArtifactUrl `
              -type Sandbox `
              -country it `
              -select Latest
            updateHosts    = $true
            memoryLimit    = "8G"
            includeTestToolkit = $true
            includeTestLibrariesOnly = $true
          }
          New-BcContainer @params
          echo "container_name=$containerName" >> $env:GITHUB_OUTPUT

      - name: Install & run tests
        shell: pwsh
        run: |
          $containerName = "${{ steps.container.outputs.container_name }}"
          $credential = [PSCredential]::new("admin", (ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force))

          # Install the compiled app
          $appFile = (Get-ChildItem "output/*.app" | Select-Object -First 1).FullName
          Publish-BcContainerApp `
            -containerName $containerName `
            -credential $credential `
            -appFile $appFile `
            -install `
            -sync `
            -skipVerification

          # Run tests
          $testResults = Run-TestsInBcContainer `
            -containerName $containerName `
            -credential $credential `
            -XUnitResultFileName "$env:GITHUB_WORKSPACE/TestResults.xml" `
            -returnTrueIfAllPassed

          if (-not $testResults) {
            Write-Error "Some tests failed. Check TestResults.xml."
            exit 1
          }
          Write-Host "All tests passed."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xml

      - name: Cleanup container
        if: always()
        shell: pwsh
        run: |
          Remove-BcContainer -containerName "${{ steps.container.outputs.container_name }}" -ErrorAction SilentlyContinue

  # ── Deploy to Sandbox ────────────────────────────────────────────────
  deploy:
    name: Deploy to Sandbox
    needs: [gate, build, test]
    runs-on: ubuntu-latest
    environment: Sandbox
    steps:
      - name: Download .app artifact
        uses: actions/download-artifact@v4
        with:
          name: al-app
          path: output

      - name: Publish to BC Sandbox via Admin API
        env:
          BC_ADMIN_TOKEN: ${{ secrets.BC_ADMIN_TOKEN }}
          BC_ENVIRONMENT: ${{ secrets.BC_SANDBOX_ENVIRONMENT }}
          BC_TENANT_ID: ${{ secrets.BC_TENANT_ID }}
        run: |
          set -euo pipefail

          APP_FILE=$(ls output/*.app | head -1)
          echo "Publishing $APP_FILE to environment: $BC_ENVIRONMENT"

          # Upload .app to BC automation API
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST \
            "https://api.businesscentral.dynamics.com/admin/v2.21/applications/BusinessCentral/environments/$BC_ENVIRONMENT/apps/publish" \
            -H "Authorization: Bearer $BC_ADMIN_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$APP_FILE")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP $HTTP_CODE"
          echo "$BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Deployment failed"
            exit 1
          fi

          echo "App published successfully to $BC_ENVIRONMENT"

      - name: Notify BC - Deployed
        if: success()
        run: |
          curl -sS -X PATCH \
            "${{ secrets.BC_CALLBACK_URL }}(gitHubIssueNumber=${{ needs.gate.outputs.issue_number }})" \
            -H "Content-Type: application/json" \
            -H "If-Match: *" \
            -d '{"status":"Deployed","lastError":""}' \
            || echo "BC callback failed (non-critical)"

      - name: Notify BC - Failed
        if: failure()
        run: |
          curl -sS -X PATCH \
            "${{ secrets.BC_CALLBACK_URL }}(gitHubIssueNumber=${{ needs.gate.outputs.issue_number }})" \
            -H "Content-Type: application/json" \
            -H "If-Match: *" \
            -d '{"status":"Failed","lastError":"Build/Test/Deploy pipeline failed. Check Actions logs."}' \
            || echo "BC callback failed (non-critical)"

      - name: Comment on PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ needs.gate.outputs.pr_number }} \
            --body "Deployed to Sandbox environment **${{ secrets.BC_SANDBOX_ENVIRONMENT }}** successfully."
