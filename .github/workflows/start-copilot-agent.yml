name: Start Copilot Coding Agent (GraphQL)

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  start-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger context (debug)
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Action: ${{ github.event.action }}"
          echo "Repo: ${{ github.repository }}"
          echo "Issue: #${{ github.event.issue.number }}"
          echo "Labels:"
          echo '${{ toJson(github.event.issue.labels) }}'

      - name: Check label ai-request
        id: lbl
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "has_label=false" >> "$GITHUB_OUTPUT"
            echo "INFO: workflow_dispatch – nessuna issue."
            exit 0
          fi

          LABELS='${{ toJson(github.event.issue.labels) }}'
          if echo "$LABELS" | grep -q '"name":"ai-request"'; then
            echo "has_label=true" >> "$GITHUB_OUTPUT"
            echo "OK: label ai-request trovata."
          else
            echo "has_label=false" >> "$GITHUB_OUTPUT"
            echo "INFO: label ai-request NON trovata."
          fi

      - name: Assign issue to Copilot via GraphQL
        if: steps.lbl.outputs.has_label == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          echo "== STEP 1: Read issue node_id via REST =="
          ISSUE_JSON=$(curl -sS -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/issues/$ISSUE_NUMBER")

          ISSUE_NODE_ID=$(echo "$ISSUE_JSON" | jq -r '.node_id')
          echo "Issue node_id: $ISSUE_NODE_ID"

          if [ -z "$ISSUE_NODE_ID" ] || [ "$ISSUE_NODE_ID" = "null" ]; then
            echo "ERROR: node_id mancante"
            echo "$ISSUE_JSON" | jq .
            exit 1
          fi

          echo "== STEP 2: Get suggestedActors(CAN_BE_ASSIGNED) via GraphQL =="
          GQL_QUERY='query($owner:String!,$name:String!){repository(owner:$owner,name:$name){suggestedActors(capabilities:[CAN_BE_ASSIGNED],first:100){nodes{login __typename ...on Bot{id} ...on User{id}}}}}'

          PAYLOAD=$(jq -n \
            --arg q "$GQL_QUERY" \
            --arg owner "$OWNER" \
            --arg name "$REPO" \
            '{query:$q, variables:{owner:$owner, name:$name}}')

          SUGGESTED=$(curl -sS -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -d "$PAYLOAD" \
            https://api.github.com/graphql)

          echo "suggestedActors response:"
          echo "$SUGGESTED" | jq .

          ERR_COUNT=$(echo "$SUGGESTED" | jq '.errors | length // 0')
          if [ "$ERR_COUNT" -gt 0 ]; then
            echo "ERROR: GraphQL ha restituito errori in suggestedActors"
            exit 1
          fi

          # Cerca copilot-swe-agent oppure copilot
          COPILOT_ID=$(echo "$SUGGESTED" | jq -r '
            .data.repository.suggestedActors.nodes[]
            | select(.login == "copilot-swe-agent" or .login == "copilot")
            | .id' | head -n 1)

          echo "Copilot actorId: $COPILOT_ID"

          if [ -z "$COPILOT_ID" ] || [ "$COPILOT_ID" = "null" ]; then
            echo "ERROR: copilot-swe-agent NON trovato tra suggestedActors."
            echo "Actors disponibili:"
            echo "$SUGGESTED" | jq '.data.repository.suggestedActors.nodes[].login'
            exit 1
          fi

          echo "== STEP 3: Assign Copilot to issue via GraphQL =="
          GQL_MUTATION='mutation($assignableId:ID!,$assigneeIds:[ID!]!){addAssigneesToAssignable(input:{assignableId:$assignableId,assigneeIds:$assigneeIds}){assignable{...on Issue{id}}}}'

          MUT_PAYLOAD=$(jq -n \
            --arg q "$GQL_MUTATION" \
            --arg assignableId "$ISSUE_NODE_ID" \
            --arg copilotId "$COPILOT_ID" \
            '{query:$q, variables:{assignableId:$assignableId, assigneeIds:[$copilotId]}}')

          ASSIGN=$(curl -sS -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -d "$MUT_PAYLOAD" \
            https://api.github.com/graphql)

          echo "Assign response:"
          echo "$ASSIGN" | jq .

          ERR_COUNT2=$(echo "$ASSIGN" | jq '.errors | length // 0')
          if [ "$ERR_COUNT2" -gt 0 ]; then
            echo "ERROR: mutation ha restituito errori"
            exit 1
          fi

          echo "SUCCESS: Issue #$ISSUE_NUMBER assegnata a Copilot."
