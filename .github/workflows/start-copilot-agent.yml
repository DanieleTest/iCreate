name: Start Copilot Coding Agent (GraphQL)

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  start-agent:
    runs-on: ubuntu-latest

    # Esegue solo se:
    # - issue creata con label ai-request
    # - oppure label ai-request aggiunta dopo
    if: >
      (github.event.action == 'opened' && contains(join(github.event.issue.labels.*.name, ','), 'ai-request')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'ai-request')

    steps:
      - name: Ensure jq is installed
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Assign issue to Copilot via GraphQL
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          echo "Repo: $OWNER/$REPO - Issue: #$ISSUE_NUMBER"

          # 1) Recupero node_id della issue via REST (serve per GraphQL)
          ISSUE_NODE_ID=$(curl -sS -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/issues/$ISSUE_NUMBER" | jq -r .node_id)

          if [ -z "$ISSUE_NODE_ID" ] || [ "$ISSUE_NODE_ID" = "null" ]; then
            echo "ERROR: non riesco a leggere node_id della issue"
            exit 1
          fi

          echo "Issue node_id: $ISSUE_NODE_ID"

          # 2) Trovo l'actorId del bot Copilot tra i suggestedActors assegnabili
          read -r -d '' QUERY << 'EOF'
          query($owner:String!, $name:String!) {
            repository(owner:$owner, name:$name) {
              suggestedActors(capabilities:[CAN_BE_ASSIGNED], first:100) {
                nodes {
                  login
                  __typename
                  ... on Bot { id }
                  ... on User { id }
                }
              }
            }
          }
          EOF

          SUGGESTED=$(curl -sS -L https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -d "$(jq -n --arg q "$QUERY" --arg owner "$OWNER" --arg name "$REPO" '{query:$q, variables:{owner:$owner, name:$name}}')")

          COPILOT_ID=$(echo "$SUGGESTED" | jq -r '.data.repository.suggestedActors.nodes[] | select(.login=="copilot-swe-agent") | .id' | head -n 1)

          if [ -z "$COPILOT_ID" ] || [ "$COPILOT_ID" = "null" ]; then
            echo "ERROR: copilot-swe-agent non trovato tra suggestedActors CAN_BE_ASSIGNED."
            echo "Diagnostica suggestedActors:"
            echo "$SUGGESTED" | jq .
            exit 1
          fi

          echo "Copilot actorId: $COPILOT_ID"

          # 3) Assegno Copilot alla issue (replaceActorsForAssignable)
          read -r -d '' MUTATION << 'EOF'
          mutation($issueId:ID!, $actorIds:[ID!]!) {
            replaceActorsForAssignable(input:{assignableId:$issueId, actorIds:$actorIds}) {
              assignable { id }
            }
          }
          EOF

          ASSIGN=$(curl -sS -L https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -d "$(jq -n --arg q "$MUTATION" --arg issueId "$ISSUE_NODE_ID" --arg actorId "$COPILOT_ID" '{query:$q, variables:{issueId:$issueId, actorIds:[$actorId]}}')")

          echo "Assign response:"
          echo "$ASSIGN" | jq .
