name: Start Copilot Coding Agent (GraphQL)

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  start-agent:
    runs-on: ubuntu-latest

    # Parte SOLO se:
    # - issue creata con label ai-request
    # - oppure label ai-request aggiunta dopo
    if: >
      (github.event.action == 'opened' && contains(join(github.event.issue.labels.*.name, ','), 'ai-request')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'ai-request')

    steps:
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Assign issue to Copilot via GraphQL
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -o pipefail

          echo "Repo: $OWNER/$REPO - Issue: #$ISSUE_NUMBER"

          echo "== STEP 1: Read issue node_id via REST =="
          # REST Issues endpoint: GET /repos/{owner}/{repo}/issues/{issue_number} [1](https://luke.geek.nz/azure/schedule-github-coding-agents/)
          ISSUE_JSON=$(curl -sS -L --fail-with-body \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/issues/$ISSUE_NUMBER")

          ISSUE_NODE_ID=$(echo "$ISSUE_JSON" | jq -r .node_id)
          echo "Issue node_id: $ISSUE_NODE_ID"

          if [ -z "$ISSUE_NODE_ID" ] || [ "$ISSUE_NODE_ID" = "null" ]; then
            echo "ERROR: node_id mancante nella issue"
            echo "$ISSUE_JSON" | jq .
            exit 1
          fi

          echo "== STEP 2: Get suggestedActors(CAN_BE_ASSIGNED) via GraphQL =="
          # NIENTE read -d '' (fa exit 1 con bash -e). Usiamo cat in una variabile.
          QUERY=$(cat <<'EOF'
          query($owner:String!, $name:String!) {
            repository(owner:$owner, name:$name) {
              suggestedActors(capabilities:[CAN_BE_ASSIGNED], first:100) {
                nodes {
                  login
                  __typename
                  ... on Bot { id }
                  ... on User { id }
                }
              }
            }
          }
EOF
          )

          PAYLOAD=$(jq -n --arg q "$QUERY" --arg owner "$OWNER" --arg name "$REPO" \
            '{query:$q, variables:{owner:$owner, name:$name}}')

          SUGGESTED=$(curl -sS -L --fail-with-body https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -d "$PAYLOAD")

          echo "GraphQL suggestedActors response:"
          echo "$SUGGESTED" | jq .

          ERR_COUNT=$(echo "$SUGGESTED" | jq '.errors | length // 0')
          if [ "$ERR_COUNT" -gt 0 ]; then
            echo "ERROR: GraphQL ha restituito errori in suggestedActors"
            exit 1
          fi

          COPILOT_ID=$(echo "$SUGGESTED" | jq -r '.data.repository.suggestedActors.nodes[]? | select(.login=="copilot-swe-agent") | .id' | head -n 1)
          echo "Copilot actorId: $COPILOT_ID"

          if [ -z "$COPILOT_ID" ] || [ "$COPILOT_ID" = "null" ]; then
            echo "ERROR: copilot-swe-agent NON trovato tra suggestedActors CAN_BE_ASSIGNED."
            echo "=> Per questo repo Copilot non risulta assegnabile/capable in questo contesto."
            exit 1
          fi

          echo "== STEP 3: Assign Copilot to issue via GraphQL mutation =="
          MUTATION=$(cat <<'EOF'
          mutation($issueId:ID!, $actorIds:[ID!]!) {
            replaceActorsForAssignable(input:{assignableId:$issueId, actorIds:$actorIds}) {
              assignable { id }
            }
          }
EOF
          )

          MUT_PAYLOAD=$(jq -n --arg q "$MUTATION" --arg issueId "$ISSUE_NODE_ID" --arg actorId "$COPILOT_ID" \
            '{query:$q, variables:{issueId:$issueId, actorIds:[$actorId]}}')

          ASSIGN=$(curl -sS -L --fail-with-body https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -d "$MUT_PAYLOAD")

          echo "GraphQL assign response:"
          echo "$ASSIGN" | jq .

          ERR_COUNT2=$(echo "$ASSIGN" | jq '.errors | length // 0')
          if [ "$ERR_COUNT2" -gt 0 ]; then
            echo "ERROR: GraphQL mutation ha restituito errori"
            exit 1
          fi

          echo "✅ SUCCESS: Issue assegnata a copilot-swe-agent via GraphQL."
