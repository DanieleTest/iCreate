name: Start Copilot Coding Agent (GraphQL) - NO EOF

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  assign-copilot:
    runs-on: ubuntu-latest

    steps:
      - name: Debug - show event
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Action: ${{ github.event.action }}"
          echo "Repo: ${{ github.repository }}"
          echo "Issue number: ${{ github.event.issue.number }}"
          echo "Labels JSON:"
          echo '${{ toJson(github.event.issue.labels) }}'

      - name: Stop if label ai-request is missing
        id: gate
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "has_label=false" >> $GITHUB_OUTPUT
            echo "INFO: workflow_dispatch avviato. Questo workflow lavora su eventi issue."
            exit 0
          fi

          LABELS='${{ toJson(github.event.issue.labels) }}'
          if echo "$LABELS" | grep -q '"name":"ai-request"'; then
            echo "has_label=true" >> $GITHUB_OUTPUT
            echo "OK: label ai-request trovata."
          else
            echo "has_label=false" >> $GITHUB_OUTPUT
            echo "INFO: label ai-request NON trovata. Esco senza fare nulla."
          fi

      - name: Install jq
        if: steps.gate.outputs.has_label == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Assign issue to Copilot via GraphQL (no heredoc)
        if: steps.gate.outputs.has_label == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -o pipefail

          echo "Repo: $OWNER/$REPO - Issue: #$ISSUE_NUMBER"

          echo "== STEP 1: Read issue node_id via REST =="
          ISSUE_JSON=$(curl -sS -L --fail-with-body \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/issues/$ISSUE_NUMBER")

          ISSUE_NODE_ID=$(echo "$ISSUE_JSON" | jq -r .node_id)
          echo "Issue node_id: $ISSUE_NODE_ID"

          if [ -z "$ISSUE_NODE_ID" ] || [ "$ISSUE_NODE_ID" = "null" ]; then
            echo "ERROR: node_id mancante nella issue"
            echo "$ISSUE_JSON" | jq .
            exit 1
          fi

          echo "== STEP 2: suggestedActors(CAN_BE_ASSIGNED) via GraphQL =="
          QUERY='query($owner:String!, $name:String!) { repository(owner:$owner, name:$name) { suggestedActors(capabilities:[CAN_BE_ASSIGNED], first:100) { nodes { login __typename ... on Bot { id } ... on User { id } } } } }'

          PAYLOAD=$(jq -n --arg q "$QUERY" --arg owner "$OWNER" --arg name "$REPO" \
            '{query:$q, variables:{owner:$owner, name:$name}}')

          SUGGESTED=$(curl -sS -L --fail-with-body https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -d "$PAYLOAD")

          echo "GraphQL suggestedActors response:"
          echo "$SUGGESTED" | jq .

          ERR_COUNT=$(echo "$SUGGESTED" | jq '.errors | length // 0')
          if [ "$ERR_COUNT" -gt 0 ]; then
            echo "ERROR: GraphQL errors in suggestedActors"
            exit 1
          fi

          COPILOT_ID=$(echo "$SUGGESTED" | jq -r '.data.repository.suggestedActors.nodes[]? | select(.login=="copilot-swe-agent") | .id' | head -n 1)
          echo "Copilot actorId: $COPILOT_ID"

          if [ -z "$COPILOT_ID" ] || [ "$COPILOT_ID" = "null" ]; then
            echo "ERROR: copilot-swe-agent NON trovato tra suggestedActors"
            exit 1
          fi

          echo "== STEP 3: replaceActorsForAssignable (assign) =="
          MUTATION='mutation($issueId:ID!, $actorIds:[ID!]!) { replaceActorsForAssignable(input:{assignableId:$issueId, actorIds:$actorIds}) { assignable { id } } }'

          MUT_PAYLOAD=$(jq -n --arg q "$MUTATION" --arg issueId "$ISSUE_NODE_ID" --arg actorId "$COPILOT_ID" \
            '{query:$q, variables:{issueId:$issueId, actorIds:[$actorId]}}')

          ASSIGN=$(curl -sS -L --fail-with-body https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -d "$MUT_PAYLOAD")

          echo "GraphQL assign response:"
          echo "$ASSIGN" | jq .

          ERR_COUNT2=$(echo "$ASSIGN" | jq '.errors | length // 0')
          if [ "$ERR_COUNT2" -gt 0 ]; then
            echo "ERROR: GraphQL errors in assign mutation"
            exit 1
          fi

          echo "✅ DONE: issue assegnata a copilot-swe-agent"
